<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Achievements List</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="app-container">
    <h2>Achievements</h2>
    <a th:href="@{/templates}" class="btn">Create New Achievement</a>

    <div class="table-container">
        <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Deadline</th>
            <th>Criteria</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="achievement : ${achievements}">
            <td th:text="${achievement.achievementName}">Achievement Name</td>
            <td th:text="${achievement.deadline != null ? achievement.deadline : '-'}">Deadline</td>
            <td>
                <ul style="margin: 0; padding-left: 20px;" th:if="${!#lists.isEmpty(achievement.listOfCriteria)}">
                    <li th:each="criterion : ${achievement.listOfCriteria}" th:text="${criterion}"></li>
                </ul>
                <span th:if="${#lists.isEmpty(achievement.listOfCriteria)}">-</span>
            </td>
            <td>
                <div th:each="line : ${achievement.description.split('\n')}" style="margin-bottom: 4px;">
                    <span th:if="${line.contains(':')}">
                        <strong th:text="${#strings.substringBefore(line, ':')} + ':'"></strong>
                        <span th:text="${#strings.substringAfter(line, ':')}"></span>
                    </span>
                    <span th:unless="${line.contains(':')}" th:text="${line}"></span>
                </div>
            </td>
            <td>
                <span th:if="${achievement.completed}" class="completed">Completed</span>
                <span th:unless="${achievement.completed}" class="not-completed">Pending</span>
            </td>
            <td>
                <a th:href="@{/edit/{id}(id=${achievement.id})}" class="btn-small btn-edit">Edit</a>
                <form th:if="${!achievement.completed}" th:action="@{/complete/{id}(id=${achievement.id})}" method="post" class="action-form">
                    <button type="submit" class="btn-small btn-complete">Mark Complete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(achievements)}">
            <td colspan="6" style="text-align: center;">No achievements found. Create one!</td>
        </tr>
        </tbody>
        </table>
    </div>
</div>
</body>
</html>
