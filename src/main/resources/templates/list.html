<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Achievements List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; color: #333; }
        h1 { color: #2c3e50; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 10px 15px; margin-bottom: 20px; color: white; background-color: #3498db; text-decoration: none; border-radius: 4px; }
        .btn:hover { background-color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
        .completed { color: #27ae60; font-weight: bold; }
        .not-completed { color: #e74c3c; }
        .action-form { display: inline; }
        .btn-small { padding: 5px 10px; font-size: 12px; border: none; cursor: pointer; border-radius: 3px; }
        .btn-edit { background-color: #f1c40f; color: white; text-decoration: none; margin-right: 5px; }
        .btn-edit:hover { background-color: #f39c12; }
        .btn-complete { background-color: #2ecc71; color: white; }
        .btn-complete:hover { background-color: #27ae60; }
    </style>
</head>
<body>
<div class="container">
    <h1>Achievements</h1>
    <a th:href="@{/templates}" class="btn">Create New Achievement</a>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="achievement : ${achievements}">
            <td th:text="${achievement.name}">Achievement Name</td>
            <td th:text="${achievement.description}">Achievement Description</td>
            <td>
                <span th:if="${achievement.completed}" class="completed">Completed</span>
                <span th:unless="${achievement.completed}" class="not-completed">Pending</span>
            </td>
            <td>
                <a th:href="@{/edit/{id}(id=${achievement.id})}" class="btn-small btn-edit">Edit</a>
                <form th:if="${!achievement.completed}" th:action="@{/complete/{id}(id=${achievement.id})}" method="post" class="action-form">
                    <button type="submit" class="btn-small btn-complete">Mark Complete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(achievements)}">
            <td colspan="4" style="text-align: center;">No achievements found. Create one!</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
