<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mock Template Service - Create Achievement</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; color: white; background-color: #2ecc71; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #27ae60; }
        .back-link { display: inline-block; margin-top: 15px; color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>Mock Template Service</h1>
    <p>This form mocks the creation process from the Template Service.</p>
    
    <form th:action="@{/save}" th:object="${achievement}" method="post">
        <div class="form-group">
            <label for="name">What is the name of the achievement?</label>
            <input type="text" id="name" th:field="*{name}" required>
        </div>
        
        <div class="form-group">
            <label for="description">What is the description of the achievement?</label>
            <textarea id="description" th:field="*{description}" rows="4" required></textarea>
        </div>
        
        <button type="submit">Save Achievement</button>
    </form>
    
    <a th:href="@{/}" class="back-link">&larr; Back to List</a>
</div>
</body>
</html>
