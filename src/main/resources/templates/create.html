<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Achievement</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="datetime-local"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="checkbox"] { width: auto; }
        button { padding: 10px 15px; color: white; background-color: #2ecc71; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        .back-link { display: inline-block; margin-top: 15px; color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="'Create: ' + ${template.templateName}">Create Achievement</h1>
    <p>Fill out the fields defined by this template.</p>
    
    <form th:action="@{/save}" method="post">
        <!-- Hidden field to carry over the template name to map it to Achievement name -->
        <input type="hidden" name="_templateName" th:value="${template.templateName}" />
        
        <div th:each="field : ${template.fields}" class="form-group">
            <label th:for="${field.variableName}" th:text="${field.prompt}">Prompt</label>
            
            <th:block th:switch="${field.type}">
                <textarea th:case="'TEXT'" th:id="${field.variableName}" th:name="${field.variableName}" rows="4" required></textarea>
                
                <input th:case="'NUMBER'" type="number" th:id="${field.variableName}" th:name="${field.variableName}" required />
                
                <input th:case="'BOOLEAN'" type="checkbox" th:id="${field.variableName}" th:name="${field.variableName}" value="true" />
                
                <input th:case="'DATETIME'" type="datetime-local" th:id="${field.variableName}" th:name="${field.variableName}" required />
                
                <input th:case="*" type="text" th:id="${field.variableName}" th:name="${field.variableName}" required />
            </th:block>
        </div>
        
        <button type="submit">Save Achievement</button>
    </form>
    
    <a th:href="@{/templates}" class="back-link">&larr; Back to Templates</a>
</div>
</body>
</html>
